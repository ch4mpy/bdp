name: bdp-labs

services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    container_name: bdp-labs.grafana-lgtm
    ports:
      - '3000:3000'
      - '4317:4317'
      - '4318:4318'
    environment:
      - GF_SERVER_ROOT_URL=http://host.docker.internal:3000/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    restart: unless-stopped
