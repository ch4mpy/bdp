# generator.properties - defaults for the controller test generator
baseUrl=https://localhost

# default response status mapping (used only if not present in source)
defaultStatus.GET=200
defaultStatus.POST=201
defaultStatus.PUT=202
defaultStatus.PATCH=202
defaultStatus.DELETE=202

# required classes to import into generated tests (module FQCNs)
requiredImports=nc.sgcb.labs.account.SpringDataWebConvertersTestConfiguration,nc.sgcb.labs.account.SecurityConfig

# generator behavior
useMockitoBean=true
useAutoConfigureAddonsWebmvcResourceServerSecurity=true

# output location
testOutputDir=src/test/java
generatedPayloadsDir=src/test/resources/generated-payloads
