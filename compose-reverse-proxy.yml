name: bdp-labs

services:
  reverse-proxy:
    container_name: bdp-labs.reverse-proxy
    image: bdp-labs.c4-soft.com/reverse-proxy
    volumes:
      - ./certs/${CN}.crt:/etc/nginx/certs/self_signed.crt
      - ./certs/${CN}.key:/etc/nginx/certs/self_signed_req_key.pem
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    environment:
      TZ: "Pacific/Tahiti"
    extra_hosts:
      - host.docker.internal:host-gateway