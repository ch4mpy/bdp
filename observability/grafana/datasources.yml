apiVersion: 1

datasources:
- name: loki
  type: loki
  access: proxy
  orgId: 1
  url: http://host.docker.internal:3100
  basicAuth: false
  isDefault: true
  version: 1
  editable: false
  jsonData:
    derivedFields:
    - datasourceUid: tempo
      matcherRegex: traceID=(\w+)
      name: TraceID
      url: $${__value.raw}
- name: prometheus
  type: prometheus
  uid: prometheus
  access: proxy
  url: http://host.docker.internal:9090
  isDefault: false
  version: 1
  editable: false
  basicAuth: false
  jsonData:
    httpMethod: 'GET'
    exemplarTraceIDDestination:
      name: 'traceID'
      url: 'http://host.docker.internal:3000/explore?orgId=1&left=%5B%22now-1h%22,%22now%22,%22tempo%22,%7B%22query%22:%22$${value}%22%7D%5D'
- name: tempo
  type: tempo
  uid: tempo
  access: proxy
  url: http://host.docker.internal:3200
  isDefault: false
  version: 1
  editable: false
  basicAuth: false