global:
  evaluation_interval: 3s
  scrape_interval: 3s

scrape_configs:
  - job_name: 'bff'
    scheme: https
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:7080']
        labels:
          application: 'bff'
  - job_name: 'rest-api'
    scheme: https
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'rest-api'